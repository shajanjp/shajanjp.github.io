<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Blog Cover</title>
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                margin: 0;
                background: #222;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .cover {
                width: 900px;
                height: 450px;
                position: relative;
                overflow: hidden;
                background: #181818;

                font-family: "IBM Plex Mono", monospace;
                color: #e6edf3;

                display: flex;
                align-items: center;
            }

            /* RIGHT DOT GRID */
            .cover::after {
                content: "";
                position: absolute;
                right: 0;
                top: 0;
                width: 80%;
                height: 100%;

                /* Dot pattern */
                background-image: radial-gradient(
                    rgba(255, 255, 255, 0.25) 1px,
                    transparent 1px
                );

                background-size: 25px 25px;

                /* fade effect like your screenshot */
                mask-image: linear-gradient(
                    to left,
                    rgba(0, 0, 0, 1),
                    rgba(0, 0, 0, 0.4),
                    transparent
                );

                -webkit-mask-image: linear-gradient(
                    to left,
                    rgba(0, 0, 0, 1),
                    rgba(0, 0, 0, 0.4),
                    transparent
                );

                opacity: 0.6;
                pointer-events: none;
            }

            .content {
                margin-left: 60px;
                width: 512px;
                position: relative;
                z-index: 1;
            }

            .label {
                font-size: 14px;
                font-weight: bold;
                letter-spacing: 2px;
                color: #6b7280;
                margin-bottom: 18px;
                text-transform: uppercase;
            }

            .title {
                font-size: 32px;
                font-weight: 500;
                line-height: 1.2;
                margin-bottom: 14px;
                color: #e6edf3;
            }

            .desc {
                font-size: 18px;
                color: #9aa4af;
                line-height: 1.6;
                margin-bottom: 26px;
            }

            .tags {
                display: flex;
                gap: 12px;
                text-transform: uppercase;
            }

            .tag {
                font-size: 12px;
                padding: 6px 12px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 6px;
                color: #c9d1d9;
                background: rgba(255, 255, 255, 0.02);
            }

            .icon-container {
                width: 192px;
                height: 192px;
                margin-left: 15px;
                /*background: rgba(255, 255, 255, 0.05);*/
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                border: 2px solid transparent;
                transition:
                    border-color 0.2s,
                    background 0.2s;
            }

            .icon-container.drag-over {
                border-color: #58a6ff;
                /*background: rgba(255, 255, 255, 0.1);*/
            }

            .cover-icon {
                width: 100%;
                height: 100%;
                opacity: 0.5;
                object-fit: contain;
                pointer-events: none; /* Let events bubble to container */
            }
        </style>
    </head>

    <body>
        <div class="cover">
            <div class="content" spellcheck="false">
                <div class="label" contenteditable="true">BLOG</div>

                <div class="title" contenteditable="true">Blog title</div>

                <div class="desc" contenteditable="true">
                    A short description of the blog post.
                </div>

                <div class="tags">
                    <div class="tag" contenteditable="true">TAG1</div>
                    <div class="tag" contenteditable="true">TAG2</div>
                </div>
            </div>
            <div class="icon-container">
                <img
                    class="cover-icon"
                    src="https://www.flaticon.com/download/icon/14759449?icon_id=14759449&team=1327&format=png&colored=0&type=uicon&size=256"
                    alt="cover image"
                />
            </div>
        </div>
    </body>

    <script>
        const iconContainer = document.querySelector(".icon-container");
        const iconImg = document.querySelector(".cover-icon");

        // Prevent default drag behaviors for the whole window to stop browser from opening the file
        ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
            window.addEventListener(
                eventName,
                (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                },
                false,
            );
        });

        ["dragenter", "dragover"].forEach((eventName) => {
            iconContainer.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                iconContainer.classList.add("drag-over");
                e.dataTransfer.dropEffect = "copy";
            });
        });

        iconContainer.addEventListener("dragleave", (e) => {
            e.preventDefault();
            e.stopPropagation();
            iconContainer.classList.remove("drag-over");
        });

        iconContainer.addEventListener("drop", (e) => {
            e.preventDefault();
            e.stopPropagation();
            iconContainer.classList.remove("drag-over");

            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                const file = files[0];
                if (
                    file.type === "image/png" ||
                    file.name.toLowerCase().endsWith(".png")
                ) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        iconImg.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            }
        });
        document.addEventListener("keydown", (e) => {
            // Check for Shift + T
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                e.preventDefault();

                const container = document.querySelector(".tags");

                if (!container) return;

                // Create new tag
                const newTag = document.createElement("div");
                newTag.className = "tag";
                newTag.setAttribute("contenteditable", "true");
                newTag.textContent = "NEW TAG";

                // Append to container
                container.appendChild(newTag);

                // Focus on new tag
                newTag.focus();

                // Optional: place cursor at end
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(newTag);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }
        });
    </script>
</html>

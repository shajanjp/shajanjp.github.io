<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Page cover generator</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        fontFamily: {
                            mono: ['"IBM Plex Mono"', "monospace"],
                        },
                    },
                },
            };
        </script>
    </head>

    <body
        class="bg-[#222] flex flex-col items-center min-h-screen m-0 pt-8 gap-8"
    >
        <!-- Toolbar -->
        <div
            class="flex gap-4 p-4 bg-white/10 rounded-lg backdrop-blur-md border border-white/10 text-white font-mono text-sm z-50"
        >
            <div class="flex items-center gap-2">
                <label for="theme-toggle">Theme:</label>
                <select
                    id="theme-toggle"
                    class="bg-[#333] border border-white/20 rounded px-2 py-1 outline-none"
                >
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <label for="size-preset">Size:</label>
                <select
                    id="size-preset"
                    class="bg-[#333] border border-white/20 rounded px-2 py-1 outline-none"
                >
                    <option value="default">Default (900x450)</option>
                    <option value="og">OG Image (1200x630)</option>
                    <option value="linkedin">LinkedIn (1080x1080)</option>
                    <option value="whatsapp">
                        WhatsApp Status (1080x1920)
                    </option>
                </select>
            </div>
            <button
                id="download-btn"
                class="bg-[#58a6ff] hover:bg-[#4a9eff] text-white px-4 py-1 rounded transition-colors ml-4"
            >
                Download (Copy to Clipboard)
            </button>
        </div>

        <!-- Preview Container (for scaling if needed) -->
        <div
            id="preview-container"
            class="relative dark transition-transform origin-top"
        >
            <!-- Parent div: added 'justify-center' and 'gap-[1%]' -->
            <div
                id="cover"
                class="bg-zinc-100 dark:bg-zinc-900 text-zinc-800 dark:text-zinc-300 w-[900px] h-[450px] relative overflow-hidden font-mono flex items-center justify-center gap-[1%] transition-all duration-300 after:content-[''] after:absolute after:right-0 after:top-0 after:w-[80%] after:h-full after:bg-[radial-gradient(rgba(0,0,0,0.1)_0.1em,transparent_0.1em)] dark:after:bg-[radial-gradient(rgba(255,255,255,0.25)_0.1em,transparent_0.1em)] after:bg-[length:2.5em_2.5em] after:[mask-image:linear-gradient(to_left,rgba(0,0,0,1),rgba(0,0,0,0.4),transparent)] after:[-webkit-mask-image:linear-gradient(to_left,rgba(0,0,0,1),rgba(0,0,0,0.4),transparent)] after:opacity-60 after:pointer-events-none"
                style="font-size: 10px"
            >
                <!-- Child 1: Content -->
                <div class="content w-[51.2em]" spellcheck="false">
                    <div
                        class="label text-[1.4em] font-bold tracking-[0.2em] text-[#6b7280] mb-[0.6em] uppercase"
                        contenteditable="true"
                    >
                        BLOG
                    </div>

                    <div
                        class="title text-[3.2em] font-medium leading-[1.2] mb-[0.5em] text-[#111827] dark:text-[#e6edf3]"
                        contenteditable="true"
                    >
                        Blog title
                    </div>

                    <div
                        class="desc text-[1.8em] text-[#4b5563] dark:text-[#9aa4af] leading-[1.6] mb-[0.9em]"
                        contenteditable="true"
                    >
                        A short description of the blog post.
                    </div>

                    <div class="tags flex gap-[1.2em] uppercase">
                        <div
                            class="tag text-[1.2em] px-[1em] py-[0.5em] border border-black/10 dark:border-white/10 rounded-[0.6em] text-[#374151] dark:text-[#c9d1d9] bg-black/[0.02] dark:bg-white/[0.02]"
                            contenteditable="true"
                        >
                            TAG1
                        </div>
                        <div
                            class="tag text-[1.2em] px-[1em] py-[0.5em] border border-black/10 dark:border-white/10 rounded-[0.6em] text-[#374151] dark:text-[#c9d1d9] bg-black/[0.02] dark:bg-white/[0.02]"
                            contenteditable="true"
                        >
                            TAG2
                        </div>
                    </div>
                </div>

                <!-- Child 2: Icon (Removed ml-[45px]) -->
                <div
                    class="icon-container w-[19.2em] h-[19.2em] flex items-center justify-center cursor-pointer border-2 border-transparent transition-all duration-200 z-10"
                >
                    <img
                        class="cover-icon w-full h-auto transition-all duration-300 invert-[30%] dark:invert-[80%]"
                        src="/assets/img/home.png"
                        alt="cover image"
                    />
                </div>
            </div>
        </div>
    </body>

    <script>
        const cover = document.getElementById("cover");
        const previewContainer = document.getElementById("preview-container");
        const themeToggle = document.getElementById("theme-toggle");
        const sizePreset = document.getElementById("size-preset");
        const iconContainer = document.querySelector(".icon-container");
        const iconImg = document.querySelector(".cover-icon");

        const presets = {
            default: { w: 900, h: 450 },
            og: { w: 1200, h: 630 },
            linkedin: { w: 1080, h: 1080 },
            whatsapp: { w: 1080, h: 1920 },
        };

        function updateLayout() {
            const preset = presets[sizePreset.value];
            cover.style.width = preset.w + "px";
            cover.style.height = preset.h + "px";

            // Calculate base font size for scaling (Reference: 900px width = 10px font size)
            const baseFontSize = (preset.w / 900) * 10;
            cover.style.fontSize = baseFontSize + "px";

            // Scale to fit screen
            const padding = 100;
            const availableWidth = window.innerWidth - padding;
            const availableHeight =
                window.innerHeight - cover.offsetTop - padding;
            const scaleW = availableWidth / preset.w;
            const scaleH = availableHeight / preset.h;
            const scale = Math.min(1, scaleW, scaleH);

            previewContainer.style.transform = `scale(${scale})`;
        }

        themeToggle.addEventListener("change", (e) => {
            if (e.target.value === "light") {
                previewContainer.classList.remove("dark");
            } else {
                previewContainer.classList.add("dark");
            }
        });

        sizePreset.addEventListener("change", updateLayout);
        window.addEventListener("resize", updateLayout);
        updateLayout();

        // Prevent default drag behaviors for the whole window to stop browser from opening the file
        ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
            window.addEventListener(
                eventName,
                (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                },
                false,
            );
        });

        ["dragenter", "dragover"].forEach((eventName) => {
            iconContainer.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                iconContainer.classList.add("!border-[#58a6ff]");
                e.dataTransfer.dropEffect = "copy";
            });
        });

        iconContainer.addEventListener("dragleave", (e) => {
            e.preventDefault();
            e.stopPropagation();
            iconContainer.classList.remove("!border-[#58a6ff]");
        });

        iconContainer.addEventListener("drop", (e) => {
            e.preventDefault();
            e.stopPropagation();
            iconContainer.classList.remove("!border-[#58a6ff]");

            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                const file = files[0];
                if (
                    file.type === "image/png" ||
                    file.name.toLowerCase().endsWith(".png")
                ) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        iconImg.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            }
        });

        document.addEventListener("keydown", (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                e.preventDefault();
                const container = document.querySelector(".tags");
                if (!container) return;

                const existingTag = container.querySelector(".tag");
                const newTag = document.createElement("div");

                // Copy classes from existing tag if available, otherwise use default
                newTag.className = existingTag
                    ? existingTag.className
                    : "tag text-[1.2em] px-[1.2em] py-[0.6em] border border-black/10 dark:border-white/10 rounded-[0.6em] text-[#374151] dark:text-[#c9d1d9] bg-black/[0.02] dark:bg-white/[0.02]";

                newTag.setAttribute("contenteditable", "true");
                newTag.textContent = "NEW TAG";
                container.appendChild(newTag);
                newTag.focus();
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(newTag);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }
        });

        // Add dummy function for download button to avoid errors
        document
            .getElementById("download-btn")
            .addEventListener("click", () => {
                alert(
                    "Download functionality would go here (e.g., using html2canvas or similar)",
                );
            });
    </script>
</html>

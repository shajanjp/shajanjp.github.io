<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Page cover generator</title>
        <link rel="stylesheet" href="/assets/css/style.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            mono: ['"IBM Plex Mono"', "monospace"],
                        },
                    },
                },
            };
        </script>
    </head>

    <body class="bg-[#222] flex justify-center items-center min-h-screen m-0">
        <div
            class="cover w-[900px] h-[450px] relative overflow-hidden bg-[#181818] font-mono text-[#e6edf3] flex items-center after:content-[''] after:absolute after:right-0 after:top-0 after:w-[80%] after:h-full after:bg-[radial-gradient(rgba(255,255,255,0.25)_1px,transparent_1px)] after:bg-[length:25px_25px] after:[mask-image:linear-gradient(to_left,rgba(0,0,0,1),rgba(0,0,0,0.4),transparent)] after:[-webkit-mask-image:linear-gradient(to_left,rgba(0,0,0,1),rgba(0,0,0,0.4),transparent)] after:opacity-60 after:pointer-events-none"
        >
            <div
                class="content ml-[60px] w-[512px] relative z-10"
                spellcheck="false"
            >
                <div
                    class="label text-[14px] font-bold tracking-[2px] text-[#6b7280] mb-[18px] uppercase"
                    contenteditable="true"
                >
                    BLOG
                </div>

                <div
                    class="title text-[32px] font-medium leading-[1.2] mb-[14px] text-[#e6edf3]"
                    contenteditable="true"
                >
                    Blog title
                </div>

                <div
                    class="desc text-[18px] text-[#9aa4af] leading-[1.6] mb-[26px]"
                    contenteditable="true"
                >
                    A short description of the blog post.
                </div>

                <div class="tags flex gap-[12px] uppercase">
                    <div
                        class="tag text-[12px] px-[12px] py-[6px] border border-white/10 rounded-[6px] text-[#c9d1d9] bg-white/[0.02]"
                        contenteditable="true"
                    >
                        TAG1
                    </div>
                    <div
                        class="tag text-[12px] px-[12px] py-[6px] border border-white/10 rounded-[6px] text-[#c9d1d9] bg-white/[0.02]"
                        contenteditable="true"
                    >
                        TAG2
                    </div>
                </div>
            </div>
            <div
                class="icon-container w-[192px] h-[192px] ml-[45px] flex items-center justify-center cursor-pointer border-2 border-transparent transition-all duration-200"
            >
                <img
                    class="cover-icon w-full h-full opacity-80 object-contain pointer-events-none invert-100"
                    src="https://www.flaticon.com/download/icon/14759449?icon_id=14759449&team=1327&format=png&colored=0&type=uicon&size=256"
                    alt="cover image"
                />
            </div>
        </div>
    </body>

    <script>
        const iconContainer = document.querySelector(".icon-container");
        const iconImg = document.querySelector(".cover-icon");

        // Prevent default drag behaviors for the whole window to stop browser from opening the file
        ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
            window.addEventListener(
                eventName,
                (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                },
                false,
            );
        });

        ["dragenter", "dragover"].forEach((eventName) => {
            iconContainer.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                iconContainer.classList.add("!border-[#58a6ff]");
                e.dataTransfer.dropEffect = "copy";
            });
        });

        iconContainer.addEventListener("dragleave", (e) => {
            e.preventDefault();
            e.stopPropagation();
            iconContainer.classList.remove("!border-[#58a6ff]");
        });

        iconContainer.addEventListener("drop", (e) => {
            e.preventDefault();
            e.stopPropagation();
            iconContainer.classList.remove("!border-[#58a6ff]");

            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                const file = files[0];
                if (
                    file.type === "image/png" ||
                    file.name.toLowerCase().endsWith(".png")
                ) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        iconImg.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            }
        });
        document.addEventListener("keydown", (e) => {
            // Check for Shift + T
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                e.preventDefault();

                const container = document.querySelector(".tags");

                if (!container) return;

                // Create new tag
                const newTag = document.createElement("div");
                newTag.className =
                    "tag text-[12px] px-[12px] py-[6px] border border-white/10 rounded-[6px] text-[#c9d1d9] bg-white/[0.02]";
                newTag.setAttribute("contenteditable", "true");
                newTag.textContent = "NEW TAG";

                // Append to container
                container.appendChild(newTag);

                // Focus on new tag
                newTag.focus();

                // Optional: place cursor at end
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(newTag);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }
        });
    </script>
</html>
